# ============ 路由规则 ============
# 规则优先级：从上到下依次匹配，命中即停止
rules:
  # -------- DNS 相关规则 --------
  - DST-PORT,53,🌐 DNS_Hijack
  
# === 插入开始：去广告与自定义应用 ===
  # 1. 强力去广告 (Anti-Ad + QUIC阻断)
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((GEOIP,CN)))),REJECT
  - RULE-SET,AntiAd,广告拦截
  # === 自定义APP分流 ===
  - RULE-SET,Talkin_Custom,Talkin
  - RULE-SET,Reddit_域,Reddit
  - RULE-SET,Soul_域,Soul         # 现在用远程规则了，不用 Custom
  - RULE-SET,WeChat_域,微信
  - RULE-SET,Douyin_域,抖音       # Blackmatrix7 的抖音包含极全，不用担心漏网
  - RULE-SET,Kuaishou_域,快手
  - RULE-SET,Xiaohongshu_域,小红书
  #测试
  - DOMAIN-SUFFIX,featureassets.org,Talkin
  - DOMAIN-SUFFIX,prodregistryv2.org,Talkin
  - DOMAIN-SUFFIX,prodregistryyv2.org,Talkin
  - DOMAIN-SUFFIX,spc.n26.com,Talkin
  # === 插入结束 ===
  # -------- 自定义规则优先 --------
  - RULE-SET,直连名单,国内直连名单
  - RULE-SET,代理名单,海外代理名单
  - PROCESS-NAME,sub_store_node,订阅更新
  
    
  # -------- 功能性规则 --------
  - RULE-SET,WebRTC_端/域,WebRTC
  - RULE-SET,No-ads-all_域,广告拦截

  # -------- 本地网络规则 --------
  - RULE-SET,Private_域,🇨🇳 本地直连
  - RULE-SET,Private_IP,🇨🇳 本地直连,no-resolve

  # -------- 中国大陆规则 --------
  - DOMAIN,browserleaks.com,漏网之鱼
  - RULE-SET,CN_域,🇨🇳 本地直连
  - RULE-SET,CN_IP,🇨🇳 本地直连
  - DOMAIN-KEYWORD,v6.gh-proxy,🇨🇳 本地直连
  - AND,((NETWORK,udp),(DST-PORT,443)),⛔ 拒绝连接

  # -------- 应用分流规则 --------
  - RULE-SET,GitHub_域,GitHub
  - RULE-SET,Emby_域,Emby
  - RULE-SET,E-hentai_域,E-hentai
  - RULE-SET,Pixiv_域,Pixiv
  - RULE-SET,Discord_域,Discord
  - RULE-SET,TikTok_域,TikTok

  - RULE-SET,Twitter_域,Twitter(X)
  - RULE-SET,Twitter_IP,Twitter(X),no-resolve

  - PROCESS-NAME,com.openai.chatgpt,AI
  - RULE-SET,AI_域,AI
  - RULE-SET,AI_IP,AI,no-resolve

  - DOMAIN-KEYWORD,mtalk.google,GoogleFCM

  - RULE-SET,YouTube_域,YouTube
  - RULE-SET,YouTube_IP,YouTube,no-resolve

  - RULE-SET,Google_域,Google
  - RULE-SET,Google_IP,Google,no-resolve

  - RULE-SET,Instagram_域,Instagram

  - RULE-SET,Spotify_域,Spotify
  - RULE-SET,Spotify_IP,Spotify,no-resolve

  - RULE-SET,Microsoft_域,Microsoft

  - RULE-SET,Telegram_域,Telegram
  - RULE-SET,Telegram_IP,Telegram,no-resolve

  - RULE-SET,Facebook_域,Facebook
  - RULE-SET,Facebook_IP,Facebook,no-resolve

  # 兜底规则
  - MATCH,漏网之鱼